<script>
var C=[
[["하나님의 뜻으로 말미암아 그리스도 예수의 사도 된 바울은 에베소에 있는 성도들과 그리스도 예수 안에 있는 신실한 자들에게 편지하노니","Paul, an apostle of Christ Jesus by the will of God, To the saints who are in Ephesus, and are faithful in Christ Jesus:"],["하나님 우리 아버지와 주 예수 그리스도로부터 은혜와 평강이 너희에게 있을지어다","Grace to you and peace from God our Father and the Lord Jesus Christ."],["찬송하리로다 하나님 곧 우리 주 예수 그리스도의 아버지께서 그리스도 안에서 하늘에 속한 모든 신령한 복을 우리에게 주시되","Blessed be the God and Father of our Lord Jesus Christ, who has blessed us in Christ with every spiritual blessing in the heavenly places,"],["곧 창세 전에 그리스도 안에서 우리를 택하사 우리로 사랑 안에서 그 앞에 거룩하고 흠이 없게 하시려고","even as he chose us in him before the foundation of the world, that we should be holy and blameless before him. In love"],["그 기쁘신 뜻대로 우리를 예정하사 예수 그리스도로 말미암아 자기의 아들들이 되게 하셨으니","he predestined us for adoption to himself as sons through Jesus Christ, according to the purpose of his will,"],["이는 그가 사랑하시는 자 안에서 우리에게 거저 주시는 바 그의 은혜의 영광을 찬송하게 하려는 것이라","to the praise of his glorious grace, with which he has blessed us in the Beloved."],["우리는 그리스도 안에서 그의 은혜의 풍성함을 따라 그의 피로 말미암아 속량 곧 죄 사함을 받았느니라","In him we have redemption through his blood, the forgiveness of our trespasses, according to the riches of his grace,"],["이는 그가 모든 지혜와 총명을 우리에게 넘치게 하사","which he lavished upon us, in all wisdom and insight"],["그 뜻의 비밀을 우리에게 알리신 것이요 그의 기뻐하심을 따라 그리스도 안에서 때가 찬 경륜을 위하여 예정하신 것이니","making known to us the mystery of his will, according to his purpose, which he set forth in Christ"],["하늘에 있는 것이나 땅에 있는 것이 다 그리스도 안에서 통일되게 하려 하심이라","as a plan for the fullness of time, to unite all things in him, things in heaven and things on earth."],["모든 일을 그의 뜻의 결정대로 일하시는 이의 계획을 따라 우리가 예정을 입어 그 안에서 기업이 되었으니","In him we have obtained an inheritance, having been predestined according to the purpose of him who works all things according to the counsel of his will,"],["이는 우리가 그리스도 안에서 전부터 바라던 그의 영광의 찬송이 되게 하려 하심이라","so that we who were the first to hope in Christ might be to the praise of his glory."],["그 안에서 너희도 진리의 말씀 곧 너희의 구원의 복음을 듣고 그 안에서 또한 믿어 약속의 성령으로 인치심을 받았으니","In him you also, when you heard the word of truth, the gospel of your salvation, and believed in him, were sealed with the promised Holy Spirit,"],["이 성령이 우리 기업의 보증이 되사 그 얻으신 것을 속량하시고 그의 영광을 찬송하게 하려 하심이라","who is the guarantee of our inheritance until we acquire possession of it, to the praise of his glory."],["이로 말미암아 주 예수 안에서 너희 믿음과 모든 성도를 향한 사랑을 나도 듣고","For this reason, because I have heard of your faith in the Lord Jesus and your love toward all the saints,"],["내가 기도할 때에 너희로 말미암아 감사하기를 그치지 아니하고 너희를 기억하며","I do not cease to give thanks for you, remembering you in my prayers,"],["우리 주 예수 그리스도의 하나님, 영광의 아버지께서 지혜와 계시의 영을 너희에게 주사 하나님을 알게 하시고","that the God of our Lord Jesus Christ, the Father of glory, may give you the Spirit of wisdom and of revelation in the knowledge of him,"],["너희 마음의 눈을 밝히사 그의 부르심의 소망이 무엇이며 성도 안에서 그 기업의 영광의 풍성함이 무엇이며","having the eyes of your hearts enlightened, that you may know what is the hope to which he has called you, what are the riches of his glorious inheritance in the saints,"],["그의 힘의 위력으로 역사하심을 따라 믿는 우리에게 베푸신 능력의 지극히 크심이 어떠한 것을 너희로 알게 하시기를 구하노라","and what is the immeasurable greatness of his power toward us who believe, according to the working of his great might"],["그의 능력이 그리스도 안에서 역사하사 죽은 자들 가운데서 다시 살리시고 하늘에서 자기의 오른편에 앉히사","that he worked in Christ when he raised him from the dead and seated him at his right hand in the heavenly places,"],["모든 통치와 권세와 능력과 주권과 이 세상뿐 아니라 오는 세상에 일컫는 모든 이름 위에 뛰어나게 하시고","far above all rule and authority and power and dominion, and above every name that is named, not only in this age but also in the one to come."],["또 만물을 그의 발 아래에 복종하게 하시고 그를 만물 위에 교회의 머리로 삼으셨느니라","And he put all things under his feet and gave him as head over all things to the church,"],["교회는 그의 몸이니 만물 안에서 만물을 충만하게 하시는 이의 충만함이니라","which is his body, the fullness of him who fills all in all."]],
[["그는 허물과 죄로 죽었던 너희를 살리셨도다","And you were dead in the trespasses and sins"],["그 때에 너희는 그 가운데서 행하여 이 세상 풍조를 따르고 공중의 권세 잡은 자를 따랐으니 곧 지금 불순종의 아들들 가운데서 역사하는 영이라","in which you once walked, following the course of this world, following the prince of the power of the air, the spirit that is now at work in the sons of disobedience,"],["전에는 우리도 다 그 가운데서 우리 육체의 욕심을 따라 지내며 육체와 마음의 원하는 것을 하여 다른 이들과 같이 본질상 진노의 자녀이었더니","among whom we all once lived in the passions of our flesh, carrying out the desires of the body and the mind, and were by nature children of wrath, like the rest of mankind."],["긍휼이 풍성하신 하나님이 우리를 사랑하신 그 큰 사랑을 인하여","But God, being rich in mercy, because of the great love with which he loved us,"],["허물로 죽은 우리를 그리스도와 함께 살리셨고 너희는 은혜로 구원을 받은 것이라","even when we were dead in our trespasses, made us alive together with Christ - by grace you have been saved -"],["또 함께 일으키사 그리스도 예수 안에서 함께 하늘에 앉히시니","and raised us up with him and seated us with him in the heavenly places in Christ Jesus,"],["이는 그리스도 예수 안에서 우리에게 자비하심으로써 그 은혜의 지극히 풍성함을 오는 여러 세대에 나타내려 하심이라","so that in the coming ages he might show the immeasurable riches of his grace in kindness toward us in Christ Jesus."],["너희는 그 은혜에 의하여 믿음으로 말미암아 구원을 받았으니 이것은 너희에게서 난 것이 아니요 하나님의 선물이라","For by grace you have been saved through faith. And this is not your own doing; it is the gift of God,"],["행위에서 난 것이 아니니 이는 누구든지 자랑하지 못하게 함이라","not a result of works, so that no one may boast."],["우리는 그가 만드신 바라 그리스도 예수 안에서 선한 일을 위하여 지으심을 받은 자니 이 일은 하나님이 전에 예비하사 우리로 그 가운데서 행하게 하려 하심이니라","For we are his workmanship, created in Christ Jesus for good works, which God prepared beforehand, that we should walk in them."],["그러므로 생각하라 너희는 그 때에 육체로 이방인이요 손으로 육체에 행한 할례라 칭하는 자들에게 무할례자라 칭함을 받는 자들이라","Therefore remember that at one time you Gentiles in the flesh, called the uncircumcision by what is called the circumcision, which is made in the flesh by hands,"],["그 때에 너희는 그리스도 밖에 있었고 이스라엘 나라 밖의 사람이라 약속의 언약들에 대하여 외인이요 세상에서 소망이 없고 하나님도 없는 자이더니","remember that you were at that time separated from Christ, alienated from the commonwealth of Israel and strangers to the covenants of promise, having no hope and without God in the world."],["이제는 전에 멀리 있던 너희가 그리스도 예수 안에서 그리스도의 피로 가까워졌느니라","But now in Christ Jesus you who once were far off have been brought near by the blood of Christ."],["그는 우리의 화평이신지라 둘로 하나를 만드사 원수 된 것 곧 중간에 막힌 담을 자기 육체로 허시고","For he himself is our peace, who has made us both one and has broken down in his flesh the dividing wall of hostility"],["법조문으로 된 계명의 율법을 폐하셨으니 이는 이 둘로 자기 안에서 한 새 사람을 지어 화평하게 하시고","by abolishing the law of commandments expressed in ordinances, that he might create in himself one new man in place of the two, so making peace,"],["또 십자가로 이 둘을 한 몸으로 하나님과 화목하게 하려 하심이라 원수 된 것을 십자가로 소멸하시고","and might reconcile us both to God in one body through the cross, thereby killing the hostility."],["또 오셔서 먼 데 있는 너희에게 평안을 전하고 가까운 데 있는 자들에게 평안을 전하셨으니","And he came and preached peace to you who were far off and peace to those who were near."],["이는 그로 말미암아 우리 둘이 한 성령 안에서 아버지께 나아감을 얻게 하려 하심이라","For through him we both have access in one Spirit to the Father."],["그러므로 이제부터 너희는 외인도 아니요 나그네도 아니요 오직 성도들과 동일한 시민이요 하나님의 권속이라","So then you are no longer strangers and aliens, but you are fellow citizens with the saints and members of the household of God,"],["너희는 사도들과 선지자들의 터 위에 세우심을 입은 자라 그리스도 예수께서 친히 모퉁잇돌이 되셨느니라","built on the foundation of the apostles and prophets, Christ Jesus himself being the cornerstone,"],["그의 안에서 건물마다 서로 연결하여 주 안에서 성전이 되어 가고","in whom the whole structure, being joined together, grows into a holy temple in the Lord."],["너희도 성령 안에서 하나님이 거하실 처소가 되기 위하여 그리스도 예수 안에서 함께 지어져 가느니라","In him you also are being built together into a dwelling place for God by the Spirit."]],
[["이러므로 그리스도 예수의 일로 너희 이방인을 위하여 갇힌 자 된 나 바울이 말하거니와","For this reason I, Paul, a prisoner of Christ Jesus on behalf of you Gentiles,"],["너희를 위하여 내게 주신 하나님의 그 은혜의 경륜을 너희가 들었을 터이라","assuming that you have heard of the stewardship of God's grace that was given to me for you,"],["곧 계시로 내게 비밀을 알게 하신 것은 내가 이미 간단히 기록함과 같으니","how the mystery was made known to me by revelation, as I have written briefly."],["그것을 읽으면 내가 그리스도의 비밀을 깨달은 것을 너희가 알 수 있으리라","When you read this, you can perceive my insight into the mystery of Christ,"],["이제 그의 거룩한 사도들과 선지자들에게 성령으로 나타내신 것 같이 다른 세대에서는 사람의 아들들에게 알리지 아니하셨으니","which was not made known to the sons of men in other generations as it has now been revealed to his holy apostles and prophets by the Spirit."],["이는 이방인들이 복음으로 말미암아 그리스도 예수 안에서 함께 상속자가 되고 함께 지체가 되고 함께 약속에 참여하는 자가 됨이라","This mystery is that the Gentiles are fellow heirs, members of the same body, and partakers of the promise in Christ Jesus through the gospel."],["이 복음을 위하여 그의 능력이 역사하시는 대로 내게 주신 하나님의 은혜의 선물을 따라 내가 일꾼이 되었노라","Of this gospel I was made a minister according to the gift of God's grace, which was given me by the working of his power."],["모든 성도 중에 지극히 작은 자보다 더 작은 나에게 이 은혜를 주신 것은 측량할 수 없는 그리스도의 풍성함을 이방인에게 전하게 하시고","To me, though I am the very least of all the saints, this grace was given, to preach to the Gentiles the unsearchable riches of Christ,"],["영원부터 만물을 창조하신 하나님 속에 감추어졌던 비밀의 경륜이 어떠한 것을 드러내게 하려 하심이라","and to bring to light for everyone what is the plan of the mystery hidden for ages in God, who created all things,"],["이는 이제 교회로 말미암아 하늘에 있는 통치자들과 권세들에게 하나님의 각종 지혜를 알게 하려 하심이니","so that through the church the manifold wisdom of God might now be made known to the rulers and authorities in the heavenly places."],["곧 영원부터 우리 주 그리스도 예수 안에서 예정하신 뜻대로 하신 것이라","This was according to the eternal purpose that he has realized in Christ Jesus our Lord,"],["우리가 그 안에서 그를 믿음으로 말미암아 담대함과 확신을 가지고 하나님께 나아감을 얻느니라","in whom we have boldness and access with confidence through our faith in him."],["그러므로 너희에게 구하노니 너희를 위한 나의 여러 환난에 대하여 낙심하지 말라 이는 너희의 영광이니라","So I ask you not to lose heart over what I am suffering for you, which is your glory."],["이러하므로 내가 하늘과 땅에 있는 각 족속에게","For this reason I bow my knees before the Father,"],["이름을 주신 아버지 앞에 무릎을 꿇고 비노니","from whom every family in heaven and on earth is named,"],["그의 영광의 풍성함을 따라 그의 성령으로 말미암아 너희 속사람을 능력으로 강건하게 하시오며","that according to the riches of his glory he may grant you to be strengthened with power through his Spirit in your inner being,"],["믿음으로 말미암아 그리스도께서 너희 마음에 계시게 하시옵고 너희가 사랑 가운데서 뿌리가 박히고 터가 굳어져서","so that Christ may dwell in your hearts through faith - that you, being rooted and grounded in love,"],["능히 모든 성도와 함께 지식에 넘치는 그리스도의 사랑을 알고","may have strength to comprehend with all the saints what is the breadth and length and height and depth,"],["그 너비와 길이와 높이와 깊이가 어떠함을 깨달아 하나님의 모든 충만하신 것으로 너희에게 충만하게 하시기를 구하노라","and to know the love of Christ that surpasses knowledge, that you may be filled with all the fullness of God."],["우리 가운데서 역사하시는 능력대로 우리가 구하거나 생각하는 모든 것에 더 넘치도록 능히 하실 이에게","Now to him who is able to do far more abundantly than all that we ask or think, according to the power at work within us,"],["교회 안에서와 그리스도 예수 안에서 영광이 대대로 영원무궁하기를 원하노라 아멘","to him be glory in the church and in Christ Jesus throughout all generations, forever and ever. Amen."]],
[["그러므로 주 안에서 갇힌 내가 너희를 권하노니 너희가 부르심을 받은 일에 합당하게 행하여","I therefore, a prisoner for the Lord, urge you to walk in a manner worthy of the calling to which you have been called,"],["모든 겸손과 온유로 하고 오래 참음으로 사랑 가운데서 서로 용납하고","with all humility and gentleness, with patience, bearing with one another in love,"],["평안의 매는 줄로 성령이 하나 되게 하신 것을 힘써 지키라","eager to maintain the unity of the Spirit in the bond of peace."],["몸이 하나요 성령도 한 분이시니 이와 같이 너희가 부르심의 한 소망 안에서 부르심을 받았느니라","There is one body and one Spirit - just as you were called to the one hope that belongs to your call -"],["주도 한 분이시요 믿음도 하나요 세례도 하나요","one Lord, one faith, one baptism,"],["하나님도 한 분이시니 곧 만유의 아버지시라 만유 위에 계시고 만유를 통일하시고 만유 가운데 계시도다","one God and Father of all, who is over all and through all and in all."],["우리 각 사람에게 그리스도의 선물의 분량대로 은혜를 주셨나니","But grace was given to each one of us according to the measure of Christ's gift."],["그러므로 이르기를 그가 위로 올라가실 때에 사로잡혔던 자들을 사로잡으시고 사람들에게 선물을 주셨다 하였도다","Therefore it says, When he ascended on high he led a host of captives, and he gave gifts to men."],["올라가셨다 하였은즉 땅 아래 낮은 곳으로 내리셨던 것이 아니면 무엇이냐","In saying He ascended, what does it mean but that he had also descended into the lower regions, the earth?"],["내리셨던 그가 곧 모든 하늘 위에 오르신 자니 이는 만물을 충만하게 하려 하심이라","He who descended is the one who also ascended far above all the heavens, that he might fill all things."],["그가 어떤 사람은 사도로, 어떤 사람은 선지자로, 어떤 사람은 복음 전하는 자로, 어떤 사람은 목사와 교사로 삼으셨으니","And he gave the apostles, the prophets, the evangelists, the shepherds and teachers,"],["이는 성도를 온전하게 하여 봉사의 일을 하게 하며 그리스도의 몸을 세우려 하심이라","to equip the saints for the work of ministry, for building up the body of Christ,"],["우리가 다 하나님의 아들을 믿는 것과 아는 일에 하나가 되어 온전한 사람을 이루어 그리스도의 장성한 분량이 충만한 데까지 이르리니","until we all attain to the unity of the faith and of the knowledge of the Son of God, to mature manhood, to the measure of the stature of the fullness of Christ,"],["이는 우리가 이제부터 어린 아이가 되지 아니하여 사람의 속임수와 간사한 유혹에 빠져 온갖 교훈의 풍조에 밀려 요동하지 않게 하려 함이라","so that we may no longer be children, tossed to and fro by the waves and carried about by every wind of doctrine, by human cunning, by craftiness in deceitful sche
